<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Planificador SYM</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.caja{
background:white;
padding:20px;
border-radius:10px;
max-width:1200px;
margin:auto;
}

input{
padding:6px;
margin:4px;
}

button{
padding:10px;
margin-top:10px;
cursor:pointer;
}

.tabla{
border-collapse:collapse;
width:100%;
margin-top:10px;
}

.tabla th, .tabla td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

.preview{
background:#e8f4ff;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.ganttContainer{
overflow-x:auto;
border:1px solid #ccc;
margin-top:10px;
}

.ganttHeader{
display:flex;
font-size:12px;
}

.ganttMes{
background:#ddd;
text-align:center;
padding:4px;
border-right:1px solid #bbb;
}

.ganttDia{
width:30px;
text-align:center;
border-right:1px solid #eee;
}

.ganttFila{
display:flex;
align-items:center;
margin-top:4px;
}

.ganttNombre{
width:150px;
}

.ganttArea{
position:relative;
height:24px;
flex:1;
}

.barra{
position:absolute;
height:20px;
background:#4CAF50;
border-radius:4px;
}

.oculto{
display:none;
}

</style>

</head>

<body>

<div class="caja">

<h2>Planificador SYM</h2>

<!-- PROYECTO -->
<div id="paso1">

Nombre Proyecto<br>
<input id="nombre"><br>

Ubicación<br>
<input id="ubicacion"><br>

Fecha Inicio<br>
<input type="date" id="inicio"><br>

Fecha Final<br>
<input type="date" id="fin"><br>

Trabajadores Totales<br>
<input type="number" id="trabajadores" value="10"><br>

<button onclick="iniciarProyecto()">Siguiente</button>

</div>

<!-- ACTIVIDADES -->
<div id="paso2" class="oculto">

<h3>Nueva Actividad</h3>

Fase<br>
<input type="number" id="faseAct"><br>

Actividad<br>
<input id="nombreAct"><br>

Duración (días)<br>
<input type="number" id="diasAct"><br>

Trabajadores<br>
<input type="number" id="trabAct"><br>

<button onclick="agregarActividad()">Agregar Actividad</button>

<hr>

<h3>Tabla de Planificación</h3>
<table class="tabla">
<thead>
<tr>
<th>Fase</th>
<th>Actividad</th>
<th>Duración</th>
<th>Inicio</th>
<th>Final</th>
<th>Trabajadores</th>
</tr>
</thead>
<tbody id="tablaBody"></tbody>
</table>

<hr>

<h3>Disponibilidad Trabajadores</h3>
<div id="disponibilidad"></div>

<hr>

<h3>Diagrama Gantt</h3>
<div class="ganttContainer">
<div id="meses"></div>
<div id="dias" class="ganttHeader"></div>
<div id="gantt"></div>
</div>

</div>

</div>

<script>

let actividades=[];
let trabajadoresTotal=0;
let inicioProyecto;
let finProyecto;
let timeline={};

function iniciarProyecto(){

inicioProyecto=new Date(document.getElementById("inicio").value);
finProyecto=new Date(document.getElementById("fin").value);
trabajadoresTotal=parseInt(document.getElementById("trabajadores").value);

if(isNaN(inicioProyecto) || isNaN(finProyecto)){
alert("Fechas inválidas");
return;
}

document.getElementById("paso1").classList.add("oculto");
document.getElementById("paso2").classList.remove("oculto");

crearCalendario();

}

function crearCalendario(){

let meses=document.getElementById("meses");
let dias=document.getElementById("dias");

meses.innerHTML="";
dias.innerHTML="";

let totalDias=(finProyecto-inicioProyecto)/(1000*60*60*24);

let mesActual=-1;
let contadorMes=0;

for(let i=0;i<=totalDias;i++){

let fecha=new Date(inicioProyecto);
fecha.setDate(fecha.getDate()+i);

if(fecha.getMonth()!=mesActual){

if(contadorMes>0){
meses.innerHTML+=`</div>`;
}

mesActual=fecha.getMonth();
contadorMes=0;

meses.innerHTML+=`
<div class="ganttMes" style="display:inline-block">
${fecha.toLocaleString('default',{month:'short'})}
`;
}

contadorMes++;

dias.innerHTML+=`
<div class="ganttDia">${fecha.getDate()}</div>
`;

}

meses.innerHTML+=`</div>`;

}

function agregarActividad(){

let fase=parseInt(document.getElementById("faseAct").value);
let nombre=document.getElementById("nombreAct").value;
let dias=parseInt(document.getElementById("diasAct").value);
let trab=parseInt(document.getElementById("trabAct").value);

if(!fase || !nombre || !dias || !trab){
alert("Faltan datos");
return;
}

actividades.push({
fase,
nombre,
dias,
trab,
inicio:null,
fin:null
});

recalcular();
render();
limpiar();

}

function limpiar(){
document.getElementById("nombreAct").value="";
document.getElementById("diasAct").value="";
document.getElementById("trabAct").value="";
}

function recalcular(){

timeline={};

// ordenar fases
actividades.sort((a,b)=>a.fase-b.fase);

let finFase={};

actividades.forEach(act=>{

let inicio=new Date(inicioProyecto);

if(finFase[act.fase-1]){
inicio=new Date(finFase[act.fase-1]);
inicio.setDate(inicio.getDate()+1);
}

let encontrado=false;

while(!encontrado){

let valido=true;

for(let d=0; d<act.dias; d++){

let fecha=new Date(inicio);
fecha.setDate(fecha.getDate()+d);

let key=fecha.toISOString().split("T")[0];

let usados=timeline[key] || 0;

if(usados+act.trab>trabajadoresTotal){
valido=false;
break;
}

}

if(valido){

act.inicio=new Date(inicio);

let fin=new Date(inicio);
fin.setDate(fin.getDate()+act.dias-1);
act.fin=fin;

for(let d=0; d<act.dias; d++){

let fecha=new Date(inicio);
fecha.setDate(fecha.getDate()+d);

let key=fecha.toISOString().split("T")[0];

if(!timeline[key]){
timeline[key]=0;
}

timeline[key]+=act.trab;

}

finFase[act.fase]=act.fin;

encontrado=true;

}else{
inicio.setDate(inicio.getDate()+1);
}

}

});

}

function render(){

let tabla=document.getElementById("tablaBody");
let gantt=document.getElementById("gantt");
let disp=document.getElementById("disponibilidad");

tabla.innerHTML="";
gantt.innerHTML="";
disp.innerHTML="";

let totalDias=(finProyecto-inicioProyecto)/(1000*60*60*24);

actividades.forEach(act=>{

tabla.innerHTML+=`
<tr>
<td>${act.fase}</td>
<td>${act.nombre}</td>
<td>${act.dias}</td>
<td>${act.inicio ? act.inicio.toLocaleDateString() : ""}</td>
<td>${act.fin ? act.fin.toLocaleDateString() : ""}</td>
<td>${act.trab}</td>
</tr>
`;

if(act.inicio){

let offset=(act.inicio-inicioProyecto)/(1000*60*60*24);
let ancho=act.dias;

gantt.innerHTML+=`
<div class="ganttFila">
<div class="ganttNombre">${act.nombre}</div>
<div class="ganttArea">
<div class="barra"
style="
left:${offset*30}px;
width:${ancho*30}px;">
</div>
</div>
</div>
`;

}

});

// disponibilidad

for(let i=0;i<=totalDias;i++){

let fecha=new Date(inicioProyecto);
fecha.setDate(fecha.getDate()+i);

let key=fecha.toISOString().split("T")[0];

let usados=timeline[key] || 0;
let libres=trabajadoresTotal-usados;

disp.innerHTML+=`
${fecha.toLocaleDateString()} :
${libres} libres<br>
`;

}

}

</script>

</body>
</html>
