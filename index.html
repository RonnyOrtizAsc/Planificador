<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Planificador SYM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<style>

body{
font-family:Arial;
margin:20px;
background:#f5f5f5;
}

.caja{
background:white;
padding:20px;
border-radius:10px;
max-width:1000px;
margin:auto;
}

input,select,button{
margin:5px;
padding:6px;
}

button{
cursor:pointer;
}

table{
border-collapse:collapse;
margin-top:20px;
width:100%;
}

td,th{
border:1px solid black;
padding:6px;
text-align:center;
}

.oculto{
display:none;
}

.resumen{
background:#e8f0ff;
padding:10px;
border-radius:8px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="caja">

<h2>Planificador de Proyecto</h2>

<!-- PASO 1 -->
<div id="paso1">

Nombre Proyecto:
<br>
<input id="nombreProyecto">

<br><br>

Ubicación:
<br>
<input id="ubicacionProyecto">

<br><br>

Fecha Inicio:
<br>
<input type="date" id="fechaInicio">

<br><br>

Fecha Final:
<br>
<input type="date" id="fechaFinal">

<br><br>

Trabajadores Totales:
<br>
<input type="number" id="trabajadoresTotales" value="5">

<br><br>

<button onclick="irPaso2()">Siguiente</button>

</div>

<!-- PASO 2 -->
<div id="paso2" class="oculto">

<button onclick="volver1()">Atrás</button>

<h3>Agregar Actividad</h3>

Nombre:
<input id="nombreActividad">

Duración (días):
<input type="number" id="duracionActividad">

Trabajadores:
<select id="trabajadoresActividad"></select>

<br>

Depende de:
<select id="dependencia">
<option value="">Ninguna</option>
</select>

<br>

<button onclick="agregarActividad()">Agregar Actividad</button>

<div class="resumen">
Trabajadores totales:
<span id="totalTrab"></span>
</div>

<h3>Tabla Actividades</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Fase</th>
<th>Nombre</th>
<th>Duración</th>
<th>Inicio</th>
<th>Fin</th>
<th>Trabajadores</th>
<th>Depende</th>
</tr>
</thead>

<tbody id="tablaActividades"></tbody>

</table>

<h3>Diagrama de Gantt</h3>
<canvas id="gantt"></canvas>

</div>

</div>

<script>

let proyecto={}
let actividades=[]
let ganttChart=null

function irPaso2(){

proyecto.nombre=document.getElementById("nombreProyecto").value
proyecto.ubicacion=document.getElementById("ubicacionProyecto").value
proyecto.inicio=new Date(document.getElementById("fechaInicio").value)
proyecto.fin=new Date(document.getElementById("fechaFinal").value)
proyecto.trabajadores=parseInt(document.getElementById("trabajadoresTotales").value)

if(!proyecto.nombre){
alert("Falta nombre")
return
}

if(!proyecto.inicio){
alert("Falta fecha inicio")
return
}

document.getElementById("paso1").classList.add("oculto")
document.getElementById("paso2").classList.remove("oculto")

document.getElementById("totalTrab").innerText=proyecto.trabajadores

actualizarSelectTrabajadores()

}

function volver1(){
document.getElementById("paso2").classList.add("oculto")
document.getElementById("paso1").classList.remove("oculto")
}

function actualizarSelectTrabajadores(){

let sel=document.getElementById("trabajadoresActividad")
sel.innerHTML=""

for(let i=1;i<=proyecto.trabajadores;i++){

let op=document.createElement("option")
op.value=i
op.text=i

sel.appendChild(op)

}

}

function trabajadoresUsados(fecha){

let usados=0

actividades.forEach(a=>{

if(fecha>=a.inicio && fecha<=a.fin){
usados+=a.trabajadores
}

})

return usados

}

function trabajadoresDisponibles(inicio,duracion,trab){

for(let i=0;i<duracion;i++){

let f=new Date(inicio)
f.setDate(f.getDate()+i)

let usados=trabajadoresUsados(f)

if(usados+trab>proyecto.trabajadores){
return false
}

}

return true

}

function calcularInicio(dep,duracion,trab){

let fecha

if(dep){
fecha=new Date(dep.fin)
fecha.setDate(fecha.getDate()+1)
}
else{
fecha=new Date(proyecto.inicio)
}

while(!trabajadoresDisponibles(fecha,duracion,trab)){

fecha.setDate(fecha.getDate()+1)

if(proyecto.fin && fecha>proyecto.fin){
break
}

}

return fecha

}

function calcularFase(dep){

if(!dep) return 1

return dep.fase+1

}

function agregarActividad(){

let nombre=document.getElementById("nombreActividad").value
let duracion=parseInt(document.getElementById("duracionActividad").value)
let trabajadores=parseInt(document.getElementById("trabajadoresActividad").value)
let depId=document.getElementById("dependencia").value

if(!nombre || !duracion){
alert("Faltan datos")
return
}

let dep=actividades.find(a=>a.id==depId)

let inicio=calcularInicio(dep,duracion,trabajadores)

let fin=new Date(inicio)
fin.setDate(fin.getDate()+duracion-1)

let fase=calcularFase(dep)

let actividad={

id:actividades.length+1,
nombre,
duracion,
trabajadores,
inicio,
fin,
depende:depId,
fase

}

actividades.push(actividad)

actualizarDependencias()
dibujarTabla()
dibujarGantt()
limpiarFormulario()

}

function limpiarFormulario(){

document.getElementById("nombreActividad").value=""
document.getElementById("duracionActividad").value=""

}

function actualizarDependencias(){

let sel=document.getElementById("dependencia")

sel.innerHTML="<option value=''>Ninguna</option>"

actividades.forEach(a=>{

let op=document.createElement("option")
op.value=a.id
op.text=a.nombre

sel.appendChild(op)

})

}

function dibujarTabla(){

let tabla=document.getElementById("tablaActividades")

tabla.innerHTML=""

actividades.forEach(a=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${a.id}</td>
<td>${a.fase}</td>
<td>${a.nombre}</td>
<td>${a.duracion}</td>
<td>${a.inicio.toLocaleDateString()}</td>
<td>${a.fin.toLocaleDateString()}</td>
<td>${a.trabajadores}</td>
<td>${a.depende || "-"}</td>
`

tabla.appendChild(tr)

})

}

function dibujarGantt(){

let ctx=document.getElementById("gantt")

if(ganttChart){
ganttChart.destroy()
}

let data=actividades.map(a=>({
x:[a.inicio.getTime(),a.fin.getTime()],
y:a.nombre
}))

ganttChart=new Chart(ctx,{

type:"bar",

data:{
datasets:[{
data:data
}]
},

options:{
indexAxis:"y",
scales:{
x:{
type:"time",
time:{
unit:"day"
}
}
}
}

})

}

</script>

</body>
</html>
